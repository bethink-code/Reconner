<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Sunshine canvas -->
  <rect width="1200" height="630" fill="#F5C400"/>

  <!-- Mark, 2x scale of the canonical 80x40 mark, centered horizontally -->
  <g transform="translate(520, 130)">
    <circle cx="52" cy="40" r="10" fill="#1A1200"/>
    <rect x="76" y="8" width="8" height="64" rx="4" fill="#1A1200"/>
    <circle cx="108" cy="40" r="10" fill="#1A1200"/>
  </g>

  <!-- Wordmark below mark -->
  <text x="600" y="290" text-anchor="middle"
    font-family="Nunito"
    font-weight="400" font-size="56" fill="#1A1200" letter-spacing="-1">lekana</text>

  <!-- Strapline, the hero line -->
  <text x="600" y="430" text-anchor="middle"
    font-family="Nunito"
    font-weight="300" font-size="68" fill="#1A1200" letter-spacing="-1">A day&#8217;s work in 5 minutes.</text>

  <!-- Sub-brand at bottom -->
  <text x="600" y="580" text-anchor="middle"
    font-family="Figtree"
    font-weight="400" font-size="22" fill="#1A1200" opacity="0.7">a TimeWarp product by Bethink (Pty) Ltd</text>
</svg>
